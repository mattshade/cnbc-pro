        function updateFavicon() {
          const hue = (Date.now() / 200) % 360; // Completes a full cycle in 72 seconds
          const color = "hsl(" + hue + ", 45%, 60%)";
          const svg = svgTemplate(color);
          link.href = 'data:image/svg+xml;base64,' + btoa(svg);
          document.documentElement.style.setProperty('--logo-hue', hue.toString());
        }

        // Run once immediately, then interval
        updateFavicon();
        setInterval(updateFavicon, 2000); // Subtle update every 2 seconds to save CPU
      })();

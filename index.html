<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="color-scheme" content="dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>CNBC PRO Subscription Experience - Matt Shade Portfolio</title>
  </head>
  <body class="bg-background text-foreground antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        const link = document.querySelector('link[rel="icon"]');
        if (!link) return;
        const svgTemplate = (color) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="${color}" d="M 12 1 L 20 14 L 23 21 L 16 16 L 12 23 L 8 16 L 1 21 L 4 14 Z"/><circle cx="12" cy="10.5" r="3.2" fill="#ffffff"/><circle cx="12" cy="10.5" r="1.3" fill="#0a0a0b"/></svg>`;
        
        function updateFavicon() {
          const hue = (Date.now() / 200) % 360;
          const color = "hsl(" + hue + ", 45%, 60%)";
          const svg = svgTemplate(color);
          link.href = 'data:image/svg+xml;base64,' + btoa(svg);
        }

        updateFavicon();
        setInterval(updateFavicon, 2000);
      })();
    </script>
  </body>
</html>
